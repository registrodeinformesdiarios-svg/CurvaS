<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Proyectos - Cronograma y Curva S</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        .chart-container { height: 450px; position: relative; }
        .tooltip-edit {
            display: none;
            position: absolute;
            background: white;
            border: 1px solid #ccc;
            padding: 10px;
            z-index: 100;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border-radius: 8px;
        }
        .editable-cell:hover {
            background-color: #f3f4f6;
            cursor: pointer;
        }
        .page-break {
            page-break-before: always;
        }
        .loading-spinner {
            border: 2px solid #f3f3f3;
            border-top: 2px solid #3498db;
            border-radius: 50%;
            width: 14px;
            height: 14px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Drag and Drop Styles */
        .drag-handle {
            cursor: grab;
            color: #9ca3af;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
        }
        .drag-handle:active { cursor: grabbing; }
        tr.dragging {
            opacity: 0.5;
            background-color: #eff6ff !important;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen p-4 md:p-8">

    <div id="app-container" class="max-w-6xl mx-auto space-y-6">
        <!-- Header -->
        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 no-print">
            <div class="flex flex-col md:flex-row justify-between items-start mb-6 gap-4">
                <div>
                    <h1 class="text-2xl font-bold text-gray-800">Panel de Control de Proyecto</h1>
                    <h2 id="displayProjectName" class="text-lg font-medium text-blue-600 italic editable-cell rounded px-1 transition-colors" title="Doble clic para editar nombre" ondblclick="makeProjectNameEditable(this)">Proyecto sin título</h2>
                </div>
                
                <!-- Google Drive Sync Section -->
                <div class="flex flex-col gap-2 bg-blue-50 p-3 rounded-lg border border-blue-100 w-full md:w-auto">
                    <div class="flex items-center gap-2 mb-1">
                        <svg class="w-5 h-5 text-blue-600" viewBox="0 0 24 24" fill="currentColor"><path d="M12.5,2L20.6,16L17.5,22L9.4,22L12.5,2M10.5,16.5L3.5,16.5L6.5,21.5L13.5,21.5L10.5,16.5M12,4L5.5,15L18.5,15L12,4Z" /></svg>
                        <span class="text-xs font-bold text-blue-700 uppercase tracking-wider">Google Drive</span>
                    </div>
                    <div class="flex gap-2">
                        <select id="driveFilesList" onchange="loadFromDrive(this.value)" class="text-sm border rounded-md px-2 py-1 bg-white outline-none focus:ring-2 focus:ring-blue-400 min-w-[150px]">
                            <option value="">Cargando archivos...</option>
                        </select>
                        <button onclick="refreshDriveList()" class="p-1 hover:bg-blue-200 rounded" title="Refrescar lista">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M2.5 22v-6h6M2 12c0-4.4 3.6-8 8-8 3.3 0 6.2 2 7.4 4.9M22 12c0 4.4-3.6 8-8 8-3.3 0-6.2-2-7.4-4.9"/></svg>
                        </button>
                        <button id="btnSaveDrive" onclick="saveToDrive()" class="bg-blue-600 hover:bg-blue-700 text-white text-xs px-3 py-1 rounded font-bold flex items-center gap-2 transition">
                            Subir a Drive
                        </button>
                    </div>
                </div>
            </div>
            
            <div class="flex flex-wrap gap-4 items-end">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Cargar Tareas Local (.txt)</label>
                    <input type="file" id="fileInput" accept=".txt" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                </div>
                
                <div class="h-10 w-px bg-gray-200 hidden md:block"></div>

                <div class="flex items-end gap-2">
                    <div>
                        <label class="block text-[10px] uppercase font-bold text-gray-400 mb-1">Fecha de Corte</label>
                        <input type="date" id="customSnapshotDate" class="border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-orange-500 outline-none">
                    </div>
                    <button onclick="createCustomSnapshot()" class="bg-orange-500 hover:bg-orange-600 text-white px-4 py-2 rounded-lg font-medium transition flex items-center gap-2 text-sm h-[38px]">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line><line x1="12" y1="14" x2="12" y2="20"></line><line x1="9" y1="17" x2="15" y2="17"></line></svg>
                        Nuevo Corte
                    </button>
                </div>

                <button onclick="createNewSnapshot()" class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-4 py-2 rounded-lg font-medium transition flex items-center gap-2 text-sm h-[38px]">
                    Corte Hoy
                </button>

                <div class="flex gap-2">
                    <button onclick="openGanttWindow()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg font-medium transition flex items-center gap-2 text-sm h-[38px]">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="8" y1="4" x2="8" y2="9"/><line x1="7" y1="13" x2="15" y2="13"/><line x1="7" y1="17" x2="12" y2="17"/></svg>
                        Ver Gantt
                    </button>
                    <button onclick="generateReport()" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg font-medium transition flex items-center gap-2 text-sm h-[38px]">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
                        PDF
                    </button>
                    <button onclick="downloadUpdatedTxt()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-medium transition flex items-center gap-2 text-sm h-[38px]">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        Bajar TXT
                    </button>
                </div>
            </div>
        </div>

        <div id="content" class="space-y-6">
            <!-- S-Curve Section -->
            <div id="section-chart" class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                <div class="flex flex-col md:flex-row md:items-center justify-between mb-4 gap-4">
                    <div>
                        <h2 id="pdfProjectTitle" class="text-xl font-bold text-gray-800">Curva S de Avance</h2>
                        <p id="projectBoundaries" class="text-xs text-blue-600 font-medium"></p>
                    </div>
                    
                    <div class="flex flex-wrap items-center gap-4 text-sm bg-gray-50 p-2 rounded-lg border border-gray-100 no-print">
                        <button onclick="exportChartCSV()" class="flex items-center gap-1.5 bg-emerald-600 hover:bg-emerald-700 text-white text-xs px-3 py-1.5 rounded-lg font-semibold transition" title="Exportar datos del gráfico en formato CSV para importar en otra plataforma">
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                            Exportar CSV Gráfico
                        </button>
                        <div class="h-6 w-px bg-gray-300"></div>
                        <div class="flex items-center gap-2">
                            <span class="text-[10px] uppercase font-bold text-gray-400">Escala Y:</span>
                            <input type="number" id="manualMinY" placeholder="Min" onchange="renderSCurve()" class="w-16 border rounded px-1 text-center bg-white" title="Mínimo manual eje Y">
                            <input type="number" id="manualMaxY" placeholder="Max" onchange="renderSCurve()" class="w-16 border rounded px-1 text-center bg-white" title="Máximo manual eje Y">
                        </div>
                        <div class="h-6 w-px bg-gray-300"></div>
                        <div class="flex items-center gap-2">
                            <label class="text-[10px] uppercase text-gray-500 font-bold">Desde</label>
                            <input type="date" id="filterDateStart" onchange="renderSCurve()" class="border rounded px-2 py-1 bg-white shadow-sm">
                        </div>
                        <div class="flex items-center gap-2">
                            <label class="text-[10px] uppercase text-gray-500 font-bold">Hasta</label>
                            <input type="date" id="filterDateEnd" onchange="renderSCurve()" class="border rounded px-2 py-1 bg-white shadow-sm">
                        </div>
                    </div>
                </div>
                <div class="chart-container">
                    <canvas id="sCurveChart"></canvas>
                </div>
            </div>

            <!-- Schedule Table Section -->
            <div id="section-table" class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 overflow-hidden page-break">
                <div class="flex flex-col md:flex-row justify-between items-center mb-4 gap-4">
                    <h2 class="text-xl font-bold text-gray-800">Cronograma de Actividades</h2>
                    <div class="flex gap-2 no-print">
                        <button onclick="addNewGroup()" class="text-xs bg-green-600 hover:bg-green-700 text-white px-3 py-1.5 rounded-lg font-semibold transition flex items-center gap-1">
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                            Agregar Grupo
                        </button>
                        <button onclick="setAllGroupsVisibility(false)" class="text-xs bg-gray-200 hover:bg-gray-300 text-gray-700 px-3 py-1.5 rounded-lg font-semibold transition flex items-center gap-1">
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg>
                            Plegar Todo
                        </button>
                        <button onclick="setAllGroupsVisibility(true)" class="text-xs bg-blue-100 hover:bg-blue-200 text-blue-700 px-3 py-1.5 rounded-lg font-semibold transition flex items-center gap-1">
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
                            Desplegar Todo
                        </button>
                    </div>
                </div>
                <div id="ganttEditor" class="overflow-x-auto border rounded-lg">
                    <table class="w-full text-left border-collapse">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="p-3 border-b text-sm font-semibold text-gray-600 w-1/3">Tarea / Grupo</th>
                                <th class="p-3 border-b text-sm font-semibold text-gray-600">ID</th>
                                <th class="p-3 border-b text-sm font-semibold text-gray-600">Inicio</th>
                                <th class="p-3 border-b text-sm font-semibold text-gray-600">Fin</th>
                                <th class="p-3 border-b text-sm font-semibold text-gray-600 w-24">Avance (%)</th>
                                <th class="p-3 border-b text-sm font-semibold text-gray-600 w-40 text-center no-print">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="taskTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Mensajes de estado -->
    <div id="statusMessage" class="fixed bottom-4 right-4 z-50 p-4 rounded-lg shadow-lg text-white font-medium transform translate-y-20 transition-transform duration-300 pointer-events-none"></div>

    <div id="snapshotDeletePopup" class="tooltip-edit shadow-2xl border-red-200" style="min-width:180px;">
        <h4 class="font-bold text-sm mb-1 border-b pb-1 text-gray-700">Corte de avance</h4>
        <p id="snapshotDeleteDate" class="text-sm text-gray-600 mb-3"></p>
        <div class="flex justify-end gap-2">
            <button onclick="closeSnapshotPopup()" class="text-xs text-gray-500 px-2 py-1">Cancelar</button>
            <button onclick="deleteSnapshot()" class="text-xs bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded font-bold">🗑️ Eliminar</button>
        </div>
    </div>

    <div id="historyTooltip" class="tooltip-edit shadow-2xl border-blue-200">
        <h4 class="font-bold text-sm mb-2 border-b pb-1">Histórico</h4>
        <div id="historyInputs" class="space-y-2 max-h-48 overflow-y-auto pr-2"></div>
        <div class="mt-3 flex justify-end gap-2">
            <button onclick="closeTooltip()" class="text-xs text-gray-500 px-2 py-1">Cerrar</button>
            <button onclick="saveHistoryChanges()" class="text-xs bg-blue-600 text-white px-2 py-1 rounded">Guardar</button>
        </div>
    </div>

    <script>
        const GD_API_URL = 'https://script.google.com/macros/s/AKfycbzzCEA1mr_hNDRAX1irmR6cTO9XwInntFaxxWuOEfyd3SGNvOGL4pItMsnnaSG2_Oox/exec';

        let rawTxtContent = null; // Guarda el texto del último TXT cargado

        let projectData = {
            nombreProyecto: "Proyecto sin título",
            fechasCorte: [],
            grupos: [],
            fechaActual: new Date().toISOString().split('T')[0],
            absStart: null,
            absEnd: null,
            graficoConfig: { fi: null, ff: null }
        };
        let pendingProgress = {}; 
        let activeChart = null;
        let activeTaskRef = null;
        let draggedGroupIndex = null;

        document.getElementById('customSnapshotDate').value = projectData.fechaActual;
        document.getElementById('fileInput').addEventListener('change', handleFile);

        window.onload = refreshDriveList;

        function getDynamicDatePrefix() {
            const today = new Date();
            const year = today.getFullYear();
            const month = String(today.getMonth() + 1).padStart(2, '0');
            const day = String(today.getDate()).padStart(2, '0');
            return `${year}${month}${day}`;
        }

        function getFormattedFileName(ext) {
            const prefix = getDynamicDatePrefix();
            const projectName = projectData.nombreProyecto.trim().replace(/\s+/g, ' ');
            return `${prefix}_CurvaS_${projectName}.${ext}`;
        }

        function showStatus(msg, type = 'info') {
            const banner = document.getElementById('statusMessage');
            banner.innerText = msg;
            banner.className = `fixed bottom-4 right-4 z-50 p-4 rounded-lg shadow-lg text-white font-medium transform transition-transform duration-300 ${type === 'error' ? 'bg-red-500' : 'bg-blue-600'}`;
            banner.classList.remove('translate-y-20');
            setTimeout(() => banner.classList.add('translate-y-20'), 4000);
        }

        async function refreshDriveList() {
            const select = document.getElementById('driveFilesList');
            select.innerHTML = '<option value="">Buscando archivos...</option>';
            try {
                const response = await fetch(`${GD_API_URL}?action=list`);
                const files = await response.json();
                select.innerHTML = '<option value="">-- Abrir desde Drive --</option>';
                if (files.length === 0) {
                    select.innerHTML = '<option value="">No hay archivos</option>';
                } else {
                    files.forEach(f => {
                        const opt = document.createElement('option');
                        opt.value = f.id;
                        opt.innerText = f.name;
                        select.appendChild(opt);
                    });
                }
            } catch (err) {
                console.error(err);
                select.innerHTML = '<option value="">Error al cargar</option>';
            }
        }

        async function loadFromDrive(fileId) {
            if (!fileId) return;
            showStatus("Descargando archivo...");
            try {
                const response = await fetch(`${GD_API_URL}?action=download&id=${fileId}`);
                const content = await response.text();
                pendingProgress = {};
                parseTxt(content);
                calculateProjectBoundaries();
                setDefaultFilters();
                renderAll();
                showStatus("Proyecto cargado correctamente");
                // Resetear el select para permitir recargar el mismo archivo
                document.getElementById('driveFilesList').value = '';
            } catch (err) {
                console.error(err);
                showStatus("Error al descargar el archivo", "error");
            }
        }

        async function saveToDrive() {
            const btn = document.getElementById('btnSaveDrive');
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<div class="loading-spinner"></div> Subiendo...';
            const content = generateTxtString();
            const fileName = getFormattedFileName('txt');
            try {
                const response = await fetch(GD_API_URL, {
                    method: 'POST',
                    mode: 'no-cors', 
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: fileName, content: content })
                });
                showStatus(`Petición enviada: ${fileName}`);
                setTimeout(refreshDriveList, 2000); 
            } catch (err) {
                console.error(err);
                showStatus("Error al subir a Drive", "error");
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        }

        function handleFile(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                rawTxtContent = event.target.result;
                pendingProgress = {};
                parseTxt(rawTxtContent);
                calculateProjectBoundaries();
                setDefaultFilters();
                renderAll();
                // Limpiar el input para que vuelva a disparar change si se carga el mismo archivo
                e.target.value = '';
            };
            reader.readAsText(file);
        }

        function parseTxt(content) {
            const lines = content.split(/\r?\n/);
            projectData.nombreProyecto = "Proyecto sin título";
            projectData.fechasCorte = [];
            projectData.grupos = [];
            projectData.graficoConfig = { fi: null, ff: null };
            let currentGroup = null, currentTask = null, inGraficoBlock = false, inProyectoBlock = false;
            for (let i = 0; i < lines.length; i++) {
                const trimmed = lines[i].trim();
                if (!trimmed) continue;
                if (trimmed === '*Proyecto*') { inProyectoBlock = true; continue; }
                if (inProyectoBlock) { projectData.nombreProyecto = trimmed; inProyectoBlock = false; continue; }
                if (trimmed === '*Grafico*') { inGraficoBlock = true; continue; }
                if (inGraficoBlock) {
                    if (trimmed.startsWith('FI:')) projectData.graficoConfig.fi = trimmed.replace('FI:', '').trim();
                    if (trimmed.startsWith('FF:')) projectData.graficoConfig.ff = trimmed.replace('FF:', '').trim();
                    if (!trimmed.includes(':')) inGraficoBlock = false; 
                }
                const dateMatch = trimmed.match(/^#(.*)#$/);
                if (dateMatch) { projectData.fechasCorte.push(dateMatch[1]); continue; }
                const groupMatch = trimmed.match(/^<([^<].*)>$/);
                if (groupMatch) {
                    currentGroup = { nombre: groupMatch[1], tareas: [], visible: true };
                    projectData.grupos.push(currentGroup);
                    continue;
                }
                const taskMatch = trimmed.match(/^<<(.+)>>\((.*)\)\((.*)\)\((.*)\)\((.*)\)$/);
                if (taskMatch) {
                    currentTask = { nombre: taskMatch[1], id: taskMatch[2], inicio: taskMatch[3], fin: taskMatch[4], predecesoras: taskMatch[5], avances: [] };
                    currentGroup.tareas.push(currentTask);
                    continue;
                }
                const progressMatch = trimmed.match(/^\((\d+)%\)$/);
                if (progressMatch && currentTask) currentTask.avances.push(parseInt(progressMatch[1]));
            }
        }

        function calculateProjectBoundaries() {
            let min = null, max = null;
            projectData.grupos.forEach(g => {
                g.tareas.forEach(t => {
                    if (!min || t.inicio < min) min = t.inicio;
                    if (!max || t.fin > max) max = t.fin;
                });
            });
            projectData.fechasCorte.forEach(f => {
                if (!min || f < min) min = f;
            });
            projectData.absStart = min || projectData.fechaActual;
            projectData.absEnd = max || projectData.fechaActual;
            document.getElementById('displayProjectName').innerText = projectData.nombreProyecto;
            document.getElementById('pdfProjectTitle').innerText = `${projectData.nombreProyecto} - Curva S`;
            document.getElementById('projectBoundaries').innerText = `Proyecto completo: ${projectData.absStart} al ${projectData.absEnd} (Meta 100%)`;
        }

        function makeProjectNameEditable(element) {
            const oldValue = projectData.nombreProyecto;
            const input = document.createElement('input');
            input.type = 'text'; input.value = oldValue;
            input.className = "text-lg font-medium text-blue-600 italic border rounded px-2 w-full max-w-md outline-none focus:ring-2 focus:ring-blue-500";
            element.replaceWith(input);
            input.focus(); input.select();
            const save = () => {
                const newValue = input.value.trim() || "Proyecto sin título";
                projectData.nombreProyecto = newValue;
                const h2 = document.createElement('h2');
                h2.id = "displayProjectName";
                h2.className = "text-lg font-medium text-blue-600 italic editable-cell rounded px-1 transition-colors";
                h2.title = "Doble clic para editar nombre";
                h2.ondblclick = function() { makeProjectNameEditable(this); };
                h2.innerText = newValue;
                input.replaceWith(h2);
                document.getElementById('pdfProjectTitle').innerText = `${newValue} - Curva S`;
                renderSCurve();
            };
            input.onblur = save;
            input.onkeydown = (e) => {
                if (e.key === 'Enter') save();
                if (e.key === 'Escape') { input.value = oldValue; save(); }
            };
        }

        function setDefaultFilters() {
            document.getElementById('filterDateStart').value = projectData.graficoConfig.fi || projectData.absStart;
            document.getElementById('filterDateEnd').value = projectData.graficoConfig.ff || projectData.absEnd;
        }

        function renderAll() { renderTable(); renderSCurve(); }

        function toggleGroup(i) { projectData.grupos[i].visible = !projectData.grupos[i].visible; renderTable(); }

        function setAllGroupsVisibility(isVisible) {
            projectData.grupos.forEach(g => g.visible = isVisible);
            renderTable();
        }

        function addNewGroup() {
            const nuevoNombre = "Nuevo Grupo";
            projectData.grupos.push({ nombre: nuevoNombre, tareas: [], visible: true });
            renderTable();
        }

        function deleteGroup(gIdx, e) {
            if (e) e.stopPropagation();
            const groupName = projectData.grupos[gIdx].nombre;
            if(confirm(`¿Estás seguro de eliminar el grupo "${groupName}" y todas sus tareas permanentemente?`)) {
                // Eliminación correcta del array
                projectData.grupos.splice(gIdx, 1);
                // Limpiar posibles estados pendientes asociados a este grupo
                pendingProgress = {};
                calculateProjectBoundaries();
                renderAll();
                showStatus(`Grupo "${groupName}" eliminado.`);
            }
        }

        function makeGroupEditable(element, gIdx) {
            const oldValue = projectData.grupos[gIdx].nombre;
            const input = document.createElement('input');
            input.type = 'text';
            input.value = oldValue;
            input.className = "w-full border rounded px-1 text-gray-800 font-bold";
            element.innerHTML = '';
            element.appendChild(input);
            input.focus();
            const save = () => {
                const newValue = input.value.trim();
                if(newValue) {
                    projectData.grupos[gIdx].nombre = newValue;
                    renderTable();
                } else {
                    renderTable();
                }
            };
            input.onblur = save;
            input.onkeydown = (e) => { if(e.key === 'Enter') save(); };
        }

        function addTaskToGroup(gIdx, e) {
            e.stopPropagation();
            const newTask = { nombre: "Nueva Tarea", id: "0.0", inicio: projectData.fechaActual, fin: projectData.fechaActual, predecesoras: "", avances: projectData.fechasCorte.map(() => 0) };
            projectData.grupos[gIdx].tareas.push(newTask);
            projectData.grupos[gIdx].visible = true;
            renderAll();
        }

        function deleteTask(gIdx, tIdx) {
            projectData.grupos[gIdx].tareas.splice(tIdx, 1);
            calculateProjectBoundaries();
            renderAll();
        }

        function moveTask(gIdx, tIdx, direction) {
            const tareas = projectData.grupos[gIdx].tareas;
            const targetIdx = tIdx + direction;
            if (targetIdx < 0 || targetIdx >= tareas.length) return;
            [tareas[tIdx], tareas[targetIdx]] = [tareas[targetIdx], tareas[tIdx]];
            renderAll();
        }

        // --- Drag and Drop Logic para Grupos ---
        function handleDragStart(e, index) {
            draggedGroupIndex = index;
            e.target.closest('tr').classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
        }

        function handleDragOver(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
        }

        function handleDrop(e, targetIndex) {
            e.preventDefault();
            if (draggedGroupIndex !== null && draggedGroupIndex !== targetIndex) {
                const movedGroup = projectData.grupos.splice(draggedGroupIndex, 1)[0];
                projectData.grupos.splice(targetIndex, 0, movedGroup);
                renderAll();
            }
            draggedGroupIndex = null;
        }

        function handleDragEnd(e) {
            const tr = e.target.closest('tr');
            if (tr) tr.classList.remove('dragging');
        }

        function updateProgressState(key, value) {
            pendingProgress[key] = parseInt(value) || 0;
            // Actualizar color del input de la tarea hija en tiempo real
            const activeInput = document.activeElement;
            if (activeInput && activeInput.tagName === 'INPUT') {
                activeInput.classList.add('border-red-400', 'text-red-500', 'font-bold');
            }
            // Recalcular y actualizar el % del grupo en el DOM sin re-renderizar la tabla
            const parts = key.split('-');
            const gIdx = parseInt(parts[0]);
            const grupo = projectData.grupos[gIdx];
            if (!grupo || grupo.tareas.length === 0) return;
            const sortedCutDatesGroup = [...projectData.fechasCorte].sort();
            const latestCutDateGroup = sortedCutDatesGroup.length > 0 ? sortedCutDatesGroup[sortedCutDatesGroup.length - 1] : null;
            const latestCutIdxGroup = latestCutDateGroup !== null ? projectData.fechasCorte.indexOf(latestCutDateGroup) : -1;
            let totalAvance = 0;
            grupo.tareas.forEach((t, innerTIdx) => {
                const k = `${gIdx}-${innerTIdx}`;
                let baseVal = 0;
                if (latestCutIdxGroup !== -1 && t.avances[latestCutIdxGroup] !== undefined) baseVal = t.avances[latestCutIdxGroup];
                else if (t.avances.length > 0) baseVal = t.avances[t.avances.length - 1];
                totalAvance += pendingProgress[k] !== undefined ? pendingProgress[k] : baseVal;
            });
            const groupAvance = Math.round(totalAvance / grupo.tareas.length);
            // Actualizar la celda del % del grupo en el DOM
            const groupRows = document.getElementById('taskTableBody').querySelectorAll('tr');
            let rowCount = 0;
            for (let i = 0; i < projectData.grupos.length; i++) {
                const tr = groupRows[rowCount];
                if (tr && i === gIdx) {
                    const td = tr.querySelectorAll('td')[4];
                    if (td) {
                        const hasPending = grupo.tareas.some((t, innerTIdx) => pendingProgress[`${gIdx}-${innerTIdx}`] !== undefined);
                        td.innerHTML = `<span class="${hasPending ? 'text-red-500 font-bold' : ''}">${groupAvance}%</span>`;
                    }
                    break;
                }
                rowCount++;
                if (projectData.grupos[i].visible) rowCount += projectData.grupos[i].tareas.length;
            }
        }

        function makeEditable(element, gIdx, tIdx, field) {
            const oldValue = element.innerText;
            const isDate = field.includes('inicio') || field.includes('fin');
            const input = document.createElement('input');
            input.type = isDate ? 'date' : 'text';
            input.value = oldValue;
            input.className = "w-full border rounded px-1";
            element.innerHTML = '';
            element.appendChild(input);
            input.focus();
            const save = () => {
                const newValue = input.value;
                if(newValue && newValue !== oldValue) {
                    projectData.grupos[gIdx].tareas[tIdx][field] = newValue;
                    if(field !== 'id' && field !== 'nombre') calculateProjectBoundaries();
                    renderAll();
                } else {
                    element.innerText = oldValue;
                }
            };
            input.onblur = save;
            input.onkeydown = (e) => { if(e.key === 'Enter') save(); };
        }

        function renderTable() {
            const tbody = document.getElementById('taskTableBody');
            tbody.innerHTML = '';
            projectData.grupos.forEach((grupo, gIdx) => {
                let groupStart = null, groupEnd = null, groupAvance = 0;
                if (grupo.tareas.length > 0) {
                    let totalAvance = 0;
                    const sortedCutDatesGroup = [...projectData.fechasCorte].sort();
                    const latestCutDateGroup = sortedCutDatesGroup.length > 0 ? sortedCutDatesGroup[sortedCutDatesGroup.length - 1] : null;
                    const latestCutIdxGroup = latestCutDateGroup !== null ? projectData.fechasCorte.indexOf(latestCutDateGroup) : -1;
                    grupo.tareas.forEach((t, innerTIdx) => {
                        if (!groupStart || t.inicio < groupStart) groupStart = t.inicio;
                        if (!groupEnd || t.fin > groupEnd) groupEnd = t.fin;
                        const key = `${gIdx}-${innerTIdx}`;
                        let baseVal = 0;
                        if (latestCutIdxGroup !== -1 && t.avances[latestCutIdxGroup] !== undefined) baseVal = t.avances[latestCutIdxGroup];
                        else if (t.avances.length > 0) baseVal = t.avances[t.avances.length - 1];
                        const val = pendingProgress[key] !== undefined ? pendingProgress[key] : baseVal;
                        totalAvance += val;
                    });
                    groupAvance = Math.round(totalAvance / grupo.tareas.length);
                } else {
                    groupStart = "-"; groupEnd = "-"; groupAvance = 0;
                }

                const hasPendingGroup = grupo.tareas.some((t, innerTIdx) => pendingProgress[`${gIdx}-${innerTIdx}`] !== undefined);
                const groupRow = document.createElement('tr');
                groupRow.className = "bg-gray-100 font-bold hover:bg-gray-200 transition-colors group";
                // Atributos para Drag and Drop
                groupRow.draggable = true;
                groupRow.ondragstart = (e) => handleDragStart(e, gIdx);
                groupRow.ondragover = (e) => handleDragOver(e);
                groupRow.ondrop = (e) => handleDrop(e, gIdx);
                groupRow.ondragend = (e) => handleDragEnd(e);

                groupRow.innerHTML = `
                    <td class="p-3 border-b">
                        <div class="flex items-center gap-2">
                           <!-- Manejador de arrastre -->
                           <div class="drag-handle no-print" title="Arrastrar para reordenar grupo">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="5" r="1"/><circle cx="9" cy="12" r="1"/><circle cx="9" cy="19" r="1"/><circle cx="15" cy="5" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="15" cy="19" r="1"/></svg>
                           </div>
                           <span class="mr-2 no-print cursor-pointer w-6 h-6 flex items-center justify-center hover:bg-gray-300 rounded" onclick="toggleGroup(${gIdx})">${grupo.visible ? '▼' : '▶'}</span>
                           <span class="editable-cell flex-1" ondblclick="makeGroupEditable(this, ${gIdx})">${grupo.nombre}</span>
                        </div>
                    </td>
                    <td class="p-3 border-b text-sm">--</td>
                    <td class="p-3 border-b text-sm">${groupStart}</td>
                    <td class="p-3 border-b text-sm">${groupEnd}</td>
                    <td class="p-3 border-b text-center text-sm group-avance-cell-${gIdx}">${hasPendingGroup ? '<span class="text-red-500 font-bold">' : '<span>'}${groupAvance}%</span></td>
                    <td class="p-3 border-b text-center no-print">
                        <div class="flex items-center justify-center gap-2">
                           <button onclick="addTaskToGroup(${gIdx}, event)" class="bg-blue-500 hover:bg-blue-600 text-white text-[10px] px-2 py-1 rounded uppercase tracking-wider">+ Tarea</button>
                           <button onclick="deleteGroup(${gIdx}, event)" class="text-red-400 hover:text-red-600 p-1">🗑️</button>
                        </div>
                    </td>`;
                tbody.appendChild(groupRow);

                if (grupo.visible) {
                    grupo.tareas.forEach((tarea, tIdx) => {
                        const key = `${gIdx}-${tIdx}`;
                        // Buscar el avance correspondiente a la fecha de corte más reciente
                        const sortedCutDates = [...projectData.fechasCorte].sort();
                        let lastAvance = 0;
                        if (sortedCutDates.length > 0 && tarea.avances.length > 0) {
                            const latestCutDate = sortedCutDates[sortedCutDates.length - 1];
                            const latestCutIdx = projectData.fechasCorte.indexOf(latestCutDate);
                            lastAvance = latestCutIdx !== -1 && tarea.avances[latestCutIdx] !== undefined ? tarea.avances[latestCutIdx] : tarea.avances[tarea.avances.length - 1];
                        }
                        // Preservar valor digitado por el usuario si existe en pendingProgress
                        const displayVal = pendingProgress[key] !== undefined ? pendingProgress[key] : lastAvance;
                        const row = document.createElement('tr');
                        row.className = "hover:bg-white";
                        row.innerHTML = `
                            <td class="p-3 border-b pl-14 editable-cell" ondblclick="makeEditable(this, ${gIdx}, ${tIdx}, 'nombre')">${tarea.nombre}</td>
                            <td class="p-3 border-b text-sm editable-cell" ondblclick="makeEditable(this, ${gIdx}, ${tIdx}, 'id')">${tarea.id}</td>
                            <td class="p-3 border-b text-sm editable-cell" ondblclick="makeEditable(this, ${gIdx}, ${tIdx}, 'inicio')">${tarea.inicio}</td>
                            <td class="p-3 border-b text-sm editable-cell" ondblclick="makeEditable(this, ${gIdx}, ${tIdx}, 'fin')">${tarea.fin}</td>
                            <td class="p-3 border-b">
                                <input type="number" value="${displayVal}" oninput="updateProgressState('${key}', this.value)" class="w-16 border rounded text-center ${pendingProgress[key] !== undefined ? 'border-red-400 text-red-500 font-bold' : ''}">
                            </td>
                            <td class="p-3 border-b text-center no-print">
                                <div class="flex items-center justify-center gap-2">
                                    <button onclick="moveTask(${gIdx}, ${tIdx}, -1)" class="text-gray-400 hover:text-blue-600 p-1">↑</button>
                                    <button onclick="moveTask(${gIdx}, ${tIdx}, 1)" class="text-gray-400 hover:text-blue-600 p-1">↓</button>
                                    <button onmouseenter="showHistoryTooltip(event, ${gIdx}, ${tIdx})" class="text-blue-500 hover:scale-110 transition-transform px-1">🕒</button>
                                    <button onclick="deleteTask(${gIdx}, ${tIdx})" class="text-red-400 hover:text-red-600 p-1">🗑️</button>
                                </div>
                            </td>`;
                        tbody.appendChild(row);
                    });
                }
            });
        }

        function renderSCurve() {
            const ctx = document.getElementById('sCurveChart').getContext('2d');
            const viewStart = document.getElementById('filterDateStart').value;
            const viewEnd = document.getElementById('filterDateEnd').value;
            const manualMin = document.getElementById('manualMinY').value;
            const manualMax = document.getElementById('manualMaxY').value;
            if (!viewStart || !viewEnd) return;
            const startDate = new Date(viewStart);
            const endDate = new Date(viewEnd);
            const dateList = [];
            let current = new Date(startDate);
            while(current <= endDate) {
                dateList.push(current.toISOString().split('T')[0]);
                current.setDate(current.getDate() + 3); 
            }
            const finalStr = endDate.toISOString().split('T')[0];
            if(!dateList.includes(finalStr)) dateList.push(finalStr);
            const allLabels = [...new Set([...dateList, ...projectData.fechasCorte])].filter(d => d >= viewStart && d <= viewEnd).sort();
            const realPoints = [], planPoints = [], today = projectData.fechaActual;

            allLabels.forEach(fecha => {
                let sumReal = 0, sumPlan = 0, totalTasks = 0;
                const dActual = new Date(fecha);
                projectData.grupos.forEach(g => {
                    g.tareas.forEach(t => {
                        totalTasks++;
                        let rVal = 0;
                        const cutIdx = projectData.fechasCorte.indexOf(fecha);
                        if (cutIdx !== -1) rVal = t.avances[cutIdx] || 0;
                        else {
                            let lastVal = 0;
                            for (let i = 0; i < projectData.fechasCorte.length; i++) {
                                if (projectData.fechasCorte[i] <= fecha) lastVal = t.avances[i] || 0;
                                else break;
                            }
                            rVal = lastVal;
                        }
                        sumReal += rVal;
                        const dStart = new Date(t.inicio), dEnd = new Date(t.fin);
                        if (dActual >= dEnd) sumPlan += 100;
                        else if (dActual > dStart) sumPlan += ((dActual - dStart) / (dEnd - dStart)) * 100;
                    });
                });
                realPoints.push(totalTasks > 0 ? parseFloat((sumReal / totalTasks).toFixed(2)) : 0);
                planPoints.push(totalTasks > 0 ? parseFloat((sumPlan / totalTasks).toFixed(2)) : 0);
            });

            let minY = manualMin !== "" ? parseFloat(manualMin) : Math.max(0, Math.floor(Math.min(...realPoints, ...planPoints) / 10) * 10);
            let maxY = manualMax !== "" ? parseFloat(manualMax) : Math.min(100, Math.ceil(Math.max(...realPoints, ...planPoints) / 10) * 10);
            if (activeChart) activeChart.destroy();
            activeChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: allLabels,
                    datasets: [
                        { label: 'Avance Real (Actual)', data: allLabels.map((f, i) => f <= today ? realPoints[i] : null), borderColor: '#22c55e', backgroundColor: 'rgba(34,197,94,0.1)', fill: true, tension: 0.4, pointRadius: (ctx) => projectData.fechasCorte.includes(allLabels[ctx.dataIndex]) ? 5 : 0, pointHoverRadius: 7 },
                        { label: 'Planificado (Cronograma)', data: planPoints, borderColor: '#3b82f6', borderWidth: 2, pointRadius: 0, tension: 0.4 }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    scales: { y: { min: minY, max: maxY <= minY ? minY + 10 : maxY, ticks: { stepSize: 10 } }, x: { ticks: { maxTicksLimit: 12, maxRotation: 0 } } },
                    plugins: { legend: { position: 'bottom' } },
                    onClick: (e, elements, chart) => {
                        if (!elements.length) return;
                        const dataIndex = elements[0].index;
                        const fecha = allLabels[dataIndex];
                        if (!projectData.fechasCorte.includes(fecha)) return;
                        const canvasRect = chart.canvas.getBoundingClientRect();
                        const x = e.native.clientX - canvasRect.left + chart.canvas.offsetLeft;
                        const y = e.native.clientY - canvasRect.top + chart.canvas.offsetTop + window.scrollY;
                        showSnapshotPopup(fecha, x, y);
                    }
                }
            });
        }

        function showHistoryTooltip(e, g, t) {
            const tool = document.getElementById('historyTooltip');
            const cont = document.getElementById('historyInputs');
            const tarea = projectData.grupos[g].tareas[t];
            activeTaskRef = { g, t };
            cont.innerHTML = projectData.fechasCorte.map((f, i) => `<div class="flex justify-between text-xs items-center gap-4"><span class="font-medium">${f}</span><input type="number" value="${tarea.avances[i]||0}" data-idx="${i}" class="h-val w-14 border rounded px-1 text-right"></div>`).join('');
            const r = e.target.getBoundingClientRect();
            tool.style.display = 'block'; tool.style.top = (r.top + window.scrollY - 50)+'px'; tool.style.left = (r.left + 30)+'px';
        }

        function saveHistoryChanges() {
            const tarea = projectData.grupos[activeTaskRef.g].tareas[activeTaskRef.t];
            document.querySelectorAll('.h-val').forEach(inp => { tarea.avances[parseInt(inp.dataset.idx)] = parseInt(inp.value) || 0; });
            closeTooltip(); renderAll();
        }

        function closeTooltip() { document.getElementById('historyTooltip').style.display = 'none'; }

        let activeSnapshotDate = null;

        function showSnapshotPopup(fecha, x, y) {
            activeSnapshotDate = fecha;
            const popup = document.getElementById('snapshotDeletePopup');
            document.getElementById('snapshotDeleteDate').innerText = fecha;
            popup.style.display = 'block';
            popup.style.left = x + 'px';
            popup.style.top = (y - 20) + 'px';
        }

        function closeSnapshotPopup() {
            document.getElementById('snapshotDeletePopup').style.display = 'none';
            activeSnapshotDate = null;
        }

        function deleteSnapshot() {
            if (!activeSnapshotDate) return;
            const idx = projectData.fechasCorte.indexOf(activeSnapshotDate);
            if (idx === -1) return;
            projectData.fechasCorte.splice(idx, 1);
            projectData.grupos.forEach(g => {
                g.tareas.forEach(t => {
                    t.avances.splice(idx, 1);
                });
            });
            closeSnapshotPopup();
            renderAll();
            showStatus(`Corte ${activeSnapshotDate || ''} eliminado.`);
        }

        function createCustomSnapshot() {
            const selectedDate = document.getElementById('customSnapshotDate').value;
            if (selectedDate) processSnapshot(selectedDate);
        }

        function createNewSnapshot() { processSnapshot(projectData.fechaActual); }

        function processSnapshot(dateStr) {
            if (!projectData.fechasCorte.includes(dateStr)) {
                projectData.fechasCorte.push(dateStr);
                projectData.fechasCorte.sort();
            }
            const cutIdx = projectData.fechasCorte.indexOf(dateStr);
            projectData.grupos.forEach((g, gIdx) => {
                g.tareas.forEach((t, tIdx) => {
                    const key = `${gIdx}-${tIdx}`;
                    const val = pendingProgress[key] !== undefined ? pendingProgress[key] : (t.avances.length > 0 ? t.avances[t.avances.length-1] : 0);
                    if (cutIdx >= t.avances.length) t.avances.push(val);
                    else t.avances.splice(cutIdx, 0, val);
                });
            });
            pendingProgress = {}; calculateProjectBoundaries(); renderAll();
        }

        function generateTxtString() {
            const fi = document.getElementById('filterDateStart').value, ff = document.getElementById('filterDateEnd').value;
            let out = `*Proyecto*\n${projectData.nombreProyecto}\n\n*Grafico*\nFI:${fi}\nFF:${ff}\n\n`;
            out += projectData.fechasCorte.map(f => `#${f}#`).join('\n') + '\n\n';
            projectData.grupos.forEach(g => {
                out += `<${g.nombre}>\n`;
                g.tareas.forEach(t => {
                    out += `<<${t.nombre}>>(${t.id})(${t.inicio})(${t.fin})(${t.predecesoras})\n`;
                    t.avances.forEach(a => out += `(${a}%)\n`);
                    out += '\n';
                });
            });
            return out;
        }

        let ganttWindow = null;

        function openGanttWindow() {
            const txtToSend = generateTxtString() || rawTxtContent;
            if (!txtToSend || projectData.grupos.length === 0) {
                showStatus('Primero cargue un archivo .txt con tareas.', 'error');
                return;
            }
            // Si la ventana ya existe y no está cerrada, la enfocamos; si no, la abrimos
            if (ganttWindow && !ganttWindow.closed) {
                ganttWindow.focus();
                // Pequeño delay para asegurar que la ventana esté lista
                setTimeout(() => ganttWindow.postMessage({ type: 'LOAD_TXT', content: txtToSend }, '*'), 200);
            } else {
                ganttWindow = window.open('gantt2.html', 'GanttWindow', 'width=1400,height=800,resizable=yes,scrollbars=yes');
                // Esperamos a que la ventana cargue antes de enviar el mensaje
                const sendWhenReady = setInterval(() => {
                    if (ganttWindow && !ganttWindow.closed) {
                        try {
                            ganttWindow.postMessage({ type: 'LOAD_TXT', content: txtToSend }, '*');
                            clearInterval(sendWhenReady);
                        } catch(e) { /* ventana aún no lista */ }
                    } else {
                        clearInterval(sendWhenReady);
                    }
                }, 300);
            }
        }

        function exportChartCSV() {
            const viewStart = document.getElementById('filterDateStart').value;
            const viewEnd = document.getElementById('filterDateEnd').value;
            if (!viewStart || !viewEnd) { showStatus('Defina el rango de fechas del gráfico primero.', 'error'); return; }

            // Reconstruir las mismas etiquetas que usa renderSCurve
            const startDate = new Date(viewStart);
            const endDate = new Date(viewEnd);
            const dateList = [];
            let current = new Date(startDate);
            while (current <= endDate) {
                dateList.push(current.toISOString().split('T')[0]);
                current.setDate(current.getDate() + 3);
            }
            const finalStr = endDate.toISOString().split('T')[0];
            if (!dateList.includes(finalStr)) dateList.push(finalStr);
            const allLabels = [...new Set([...dateList, ...projectData.fechasCorte])]
                .filter(d => d >= viewStart && d <= viewEnd).sort();

            const today = projectData.fechaActual;
            const realPoints = [], planPoints = [];

            allLabels.forEach(fecha => {
                let sumReal = 0, sumPlan = 0, totalTasks = 0;
                const dActual = new Date(fecha);
                projectData.grupos.forEach(g => {
                    g.tareas.forEach(t => {
                        totalTasks++;
                        let rVal = 0;
                        const cutIdx = projectData.fechasCorte.indexOf(fecha);
                        if (cutIdx !== -1) rVal = t.avances[cutIdx] || 0;
                        else {
                            let lastVal = 0;
                            for (let i = 0; i < projectData.fechasCorte.length; i++) {
                                if (projectData.fechasCorte[i] <= fecha) lastVal = t.avances[i] || 0;
                                else break;
                            }
                            rVal = lastVal;
                        }
                        sumReal += rVal;
                        const dStart = new Date(t.inicio), dEnd = new Date(t.fin);
                        if (dActual >= dEnd) sumPlan += 100;
                        else if (dActual > dStart) sumPlan += ((dActual - dStart) / (dEnd - dStart)) * 100;
                    });
                });
                realPoints.push(totalTasks > 0 ? parseFloat((sumReal / totalTasks).toFixed(2)) : 0);
                planPoints.push(totalTasks > 0 ? parseFloat((sumPlan / totalTasks).toFixed(2)) : 0);
            });

            // Formato CSV compatible con el importador:
            // Primera fila: etiquetas (Fecha,label1,label2,...)
            // Fila Planificado: Planificado,val1,val2,...
            // Fila Real: Avance Real,val1,val2,... (solo hasta hoy)
            const labelRow = 'Fecha,' + allLabels.join(',');
            const planRow = 'Planificado,' + planPoints.join(',');
            const realRow = 'Avance Real,' + allLabels.map((f, i) => f <= today ? realPoints[i] : '').join(',');

            const csvContent = [labelRow, planRow, realRow].join('\n');
            const blob = new Blob([csvContent], { type: 'text/plain' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = getFormattedFileName('txt').replace('.txt', '_grafico.txt');
            a.click();
            showStatus('CSV del gráfico exportado correctamente.');
        }

        function downloadUpdatedTxt() {
            const content = generateTxtString();
            const blob = new Blob([content], { type: 'text/plain' });
            const a = document.createElement('a'); 
            a.href = URL.createObjectURL(blob); 
            a.download = getFormattedFileName('txt'); a.click();
        }

        function generateReport() {
            const element = document.getElementById('content'), noPrintElements = document.querySelectorAll('.no-print');
            noPrintElements.forEach(el => el.style.display = 'none');
            const opt = { 
                margin: [0.5, 0.5], filename: getFormattedFileName('pdf'), image: { type: 'jpeg', quality: 0.98 }, 
                html2canvas: { scale: 2, useCORS: true, logging: false, width: element.scrollWidth }, 
                jsPDF: { unit: 'in', format: 'letter', orientation: 'landscape' },
                pagebreak: { mode: ['avoid-all', 'css', 'legacy'] }
            };
            html2pdf().set(opt).from(element).save().then(() => { noPrintElements.forEach(el => el.style.display = ''); });
        }
    </script>
</body>
</html>
